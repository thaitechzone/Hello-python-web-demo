name: Code Quality

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # รันทุกวันจันทร์เวลา 00:00 UTC
    - cron: '0 0 * * 1'

jobs:
  code-quality:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install black isort pylint mypy radon
    
    - name: Check code formatting with Black
      run: |
        black --check . || echo "::warning::Code needs formatting with Black"
    
    - name: Check import sorting with isort
      run: |
        isort --check-only . || echo "::warning::Imports need sorting with isort"
    
    - name: Run Pylint
      run: |
        pylint app.py --exit-zero --output-format=text | tee pylint-report.txt
    
    - name: Calculate code complexity
      run: |
        echo "📊 Cyclomatic Complexity:"
        radon cc . -a
        echo "📈 Maintainability Index:"
        radon mi . -s
    
    - name: Type checking with mypy
      run: |
        mypy app.py --ignore-missing-imports || echo "::warning::Type hints could be improved"
    
    - name: Generate code metrics
      run: |
        echo "## Code Metrics 📊" >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
        radon cc . -a >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
    
    - name: Upload Pylint report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: pylint-report
        path: pylint-report.txt
