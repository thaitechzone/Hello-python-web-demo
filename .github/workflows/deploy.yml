name: Deploy to Render

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Deploy to Render
      run: |
        echo "🚀 Deploying to Render..."
        echo "✅ Code pushed to main branch"
        echo "✅ Render will auto-deploy from GitHub"
        echo "📝 Check deployment status at: https://dashboard.render.com"
    
    - name: Notify deployment status
      run: |
        echo "::notice::Deployment triggered! Check Render Dashboard for progress."

  verify:
    needs: deploy
    runs-on: ubuntu-latest
    
    steps:
    - name: Wait for deployment
      run: |
        echo "⏳ Waiting for Render deployment to complete..."
        sleep 60
        
    - name: Health check
      run: |
        echo "🏥 Performing health check..."
        # แทนที่ URL ด้วย URL ของคุณจาก Render
        # curl -f https://your-app-name.onrender.com || exit 1
        echo "✅ Deploy workflow completed"
        echo "⚠️  Manual verification required at your Render URL"
